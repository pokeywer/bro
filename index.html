<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CVAI — supported by Gemini API!</title>

<!-- PWA / Add-to-Home-Screen setup -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05070d">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CVAI">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
<style>
  :root{
    --void:#05070d;
    --panel: rgba(18,22,38,0.62);
    --panel-solid:#12162a;
    --star:#F3F4FF;
    --nebula-cyan:#5EEAD4;
    --nebula-violet:#8B7CF6;
    --nebula-magenta:#E879F9;
    --line: rgba(243,244,255,0.12);
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; }
  body{
    margin:0; background:var(--void); color:var(--star);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh; display:flex; flex-direction:column;
    padding:28px 20px 18px;
    overflow-x:hidden;
    position:relative;
  }

  #stars{ position:fixed; inset:0; z-index:0; display:block; }
  .nebula{
    position:fixed; border-radius:50%; filter:blur(80px); z-index:0; pointer-events:none;
    mix-blend-mode:screen; opacity:0.5;
  }
  .nebula.n1{ width:520px; height:520px; background:var(--nebula-violet); top:-10%; left:-8%; animation: drift1 34s ease-in-out infinite; }
  .nebula.n2{ width:460px; height:460px; background:var(--nebula-cyan); bottom:-12%; right:-10%; animation: drift2 40s ease-in-out infinite; opacity:0.35; }
  .nebula.n3{ width:380px; height:380px; background:var(--nebula-magenta); top:40%; right:20%; animation: drift3 46s ease-in-out infinite; opacity:0.22; }
  @keyframes drift1{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(60px,40px) scale(1.15); } }
  @keyframes drift2{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(-50px,-30px) scale(1.1); } }
  @keyframes drift3{ 0%,100%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(-40px,50px) scale(0.9); } }

  h1{
    font-family:'Space Grotesk', sans-serif; font-weight:700;
    font-size:clamp(2rem,3.4vw,2.9rem);
    margin:0 0 4px; text-align:center; position:relative; z-index:1;
    background:linear-gradient(90deg, var(--nebula-cyan), var(--star) 45%, var(--nebula-magenta));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    letter-spacing:0.01em;
  }
  .sub{ text-align:center; color:rgba(243,244,255,0.55); font-size:0.82rem; margin-bottom:20px; position:relative; z-index:1; }

  .chatwrap{
    max-width:900px; width:100%; margin:0 auto; flex:1;
    display:flex; flex-direction:column;
    background:var(--panel);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border:1px solid var(--line); border-radius:14px;
    overflow:hidden; height:calc(100vh - 150px); min-height:420px;
    box-shadow:0 20px 70px rgba(0,0,0,0.55), 0 0 0 1px rgba(139,124,246,0.06);
    position:relative; z-index:1;
  }
  .chatbar{
    display:flex; align-items:center; gap:8px; padding:12px 16px;
    background:rgba(139,124,246,0.07); border-bottom:1px solid var(--line); flex:none;
  }
  .chatbar .dot{ width:10px; height:10px; border-radius:50%; }
  .chatbar .dot:nth-child(1){ background:var(--nebula-magenta); }
  .chatbar .dot:nth-child(2){ background:#f2c94c; }
  .chatbar .dot:nth-child(3){ background:var(--nebula-cyan); }
  .chatbar .title{
    font-family:'Space Grotesk',sans-serif; font-size:0.78rem; font-weight:600;
    color:rgba(243,244,255,0.55); margin-left:6px; letter-spacing:0.02em;
  }
  .chatbar-right{ margin-left:auto; display:flex; align-items:center; gap:8px; flex:none; }
  .admin-badge{
    display:none; font-family:'Space Grotesk',sans-serif; font-size:0.68rem;
    font-weight:700; letter-spacing:0.06em; color:#f2c94c; padding:3px 10px;
    border:1px solid rgba(242,201,76,0.45); border-radius:20px; background:rgba(242,201,76,0.1);
  }
  .admin-badge.on{ display:inline-block; }
  .install-btn{
    display:none; align-items:center; gap:4px; cursor:pointer; white-space:nowrap;
    background:rgba(94,234,212,0.14); border:1px solid rgba(94,234,212,0.45);
    color:var(--nebula-cyan); font-family:'Space Grotesk',sans-serif; font-weight:600;
    font-size:0.72rem; padding:5px 11px; border-radius:20px;
  }
  .install-btn.show{ display:inline-flex; }
  .install-btn:hover{ background:rgba(94,234,212,0.26); }
  .announce-banner{
    display:none; align-items:center; gap:10px; padding:11px 16px; flex:none;
    background:linear-gradient(100deg, rgba(242,201,76,0.95), rgba(232,180,60,0.88));
    color:#241a04; border-bottom:1px solid rgba(242,201,76,0.6);
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    opacity:0; transform:translateY(-6px); transition:opacity .25s ease, transform .25s ease;
  }
  .announce-banner.show{ display:flex; opacity:1; transform:translateY(0); }
  .announce-banner .icon{ font-size:1.05rem; flex:none; }
  .announce-banner .text{
    flex:1; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:0.84rem;
    line-height:1.4; word-break:break-word;
  }
  .announce-banner button{
    background:rgba(0,0,0,0.14); border:none; color:#241a04; width:24px; height:24px;
    border-radius:50%; cursor:pointer; font-size:0.78rem; flex:none; line-height:1;
  }
  .announce-banner button:hover{ background:rgba(0,0,0,0.26); }
  .lock-banner{
    display:none; align-items:center; gap:10px; padding:11px 16px; flex:none;
    background:linear-gradient(100deg, rgba(232,90,90,0.96), rgba(190,50,50,0.9));
    color:#2a0505; border-bottom:1px solid rgba(232,90,90,0.6);
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
  }
  .lock-banner.show{ display:flex; }
  .lock-banner .icon{ font-size:1.05rem; flex:none; }
  .lock-banner .text{
    flex:1; font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:0.84rem;
    line-height:1.4; word-break:break-word;
  }
  .inputbar.locked{ opacity:0.55; }
  #messages{ flex:1; overflow-y:auto; padding:22px 26px 26px; display:flex; flex-direction:column; gap:18px; }
  #messages::-webkit-scrollbar{ width:8px; }
  #messages::-webkit-scrollbar-thumb{ background:rgba(243,244,255,0.14); border-radius:4px; }

  @keyframes msgIn{ from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
  .msg-row{ display:flex; flex-direction:column; max-width:min(78%, 620px); min-width:0; animation:msgIn 0.32s ease; }
  .msg-row.user{ align-self:flex-end; align-items:flex-end; }
  .msg-row.ai{ align-self:flex-start; align-items:flex-start; }
  .tag{
    font-family:'Space Grotesk',sans-serif; font-size:0.66rem; font-weight:600; letter-spacing:0.1em;
    text-transform:uppercase; color:rgba(243,244,255,0.35); margin-bottom:5px; padding:0 3px;
    display:flex; align-items:center; gap:7px;
  }
  .msg-time{ font-weight:400; letter-spacing:0; text-transform:none; font-size:0.62rem; color:rgba(243,244,255,0.24); }
  .msg-toolbar{ display:flex; gap:6px; margin-top:5px; opacity:0; transition:opacity .15s ease; }
  .msg-row:hover .msg-toolbar, .msg-toolbar.pinned{ opacity:1; }
  .msg-copy-btn{
    background:rgba(243,244,255,0.05); border:1px solid var(--line); color:rgba(243,244,255,0.55);
    border-radius:6px; padding:3px 9px; font-size:0.68rem; cursor:pointer; font-family:'IBM Plex Mono',monospace;
    display:flex; align-items:center; gap:5px;
  }
  .msg-copy-btn:hover{ border-color:var(--nebula-cyan); color:var(--nebula-cyan); }
  #sendBtn.stop-mode{ background:rgba(232,121,249,0.16); border-color:rgba(232,121,249,0.5); color:var(--nebula-magenta); }
  #sendBtn.stop-mode:hover{ background:rgba(232,121,249,0.28); }
  .scroll-bottom-btn{
    position:absolute; bottom:88px; left:50%; transform:translateX(-50%);
    background:var(--panel-solid); border:1px solid var(--line); color:var(--star);
    border-radius:20px; padding:6px 14px; font-size:0.75rem; cursor:pointer; display:none;
    align-items:center; gap:6px; box-shadow:0 10px 30px rgba(0,0,0,0.4); z-index:15;
    font-family:'Space Grotesk',sans-serif;
  }
  .scroll-bottom-btn.show{ display:flex; }
  .scroll-bottom-btn:hover{ border-color:var(--nebula-cyan); color:var(--nebula-cyan); }
  .starter-chips{ display:flex; flex-wrap:wrap; gap:8px; padding:4px 4px 0; }
  .starter-chip{
    background:rgba(139,124,246,0.08); border:1px solid rgba(139,124,246,0.3); color:var(--star);
    border-radius:16px; padding:7px 13px; font-size:0.76rem; cursor:pointer; font-family:'IBM Plex Mono',monospace;
  }
  .starter-chip:hover{ border-color:var(--nebula-cyan); color:var(--nebula-cyan); background:rgba(94,234,212,0.08); }
  .code-bar{
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(139,124,246,0.1); border:1px solid var(--line); border-bottom:none;
    border-radius:8px 8px 0 0; padding:5px 11px; font-family:'IBM Plex Mono',monospace;
    font-size:0.68rem; color:rgba(243,244,255,0.5); text-transform:uppercase; letter-spacing:0.05em;
  }
  .code-bar button{
    background:rgba(243,244,255,0.06); border:1px solid var(--line); color:var(--star);
    border-radius:5px; padding:2px 9px; font-size:0.66rem; cursor:pointer; text-transform:none;
    font-family:'IBM Plex Mono',monospace;
  }
  .code-bar button:hover{ border-color:var(--nebula-cyan); color:var(--nebula-cyan); }
  .msg pre.has-bar{ border-radius:0 0 8px 8px; margin-top:0; }

  .thinking-box{
    display:flex; align-items:center; gap:10px;
    background:rgba(139,124,246,0.07); border:1px solid rgba(139,124,246,0.25);
    border-radius:12px; padding:10px 14px !important;
  }
  .thinking-icon{ font-size:0.95rem; animation:thinkPulse 1.4s ease-in-out infinite; flex:none; }
  @keyframes thinkPulse{ 0%,100%{ opacity:0.45; transform:scale(0.92); } 50%{ opacity:1; transform:scale(1.08); } }
  .thinking-text{ font-size:0.85rem; color:rgba(243,244,255,0.6); font-style:italic; transition:opacity .2s ease; }
  .msg{
    padding:13px 16px; border-radius:14px; font-size:0.92rem; line-height:1.6;
    word-wrap:break-word; overflow-wrap:anywhere; word-break:break-word;
    max-width:100%; min-width:0; box-shadow:0 4px 18px rgba(0,0,0,0.18);
  }
  .msg > *:first-child{ margin-top:0; }
  .msg > *:last-child{ margin-bottom:0; }
  .msg p{ margin:0 0 10px; }
  .msg ul, .msg ol{ margin:4px 0 10px; padding-left:1.3em; }
  .msg li{ margin:3px 0; }
  .msg li::marker{ color:rgba(243,244,255,0.45); }
  .msg h1, .msg h2, .msg h3{
    font-family:'Space Grotesk',sans-serif; font-weight:700; line-height:1.3;
    margin:2px 0 8px; color:var(--star);
  }
  .msg h1{ font-size:1.15rem; } .msg h2{ font-size:1.06rem; } .msg h3{ font-size:0.98rem; }
  .msg strong{ color:var(--star); font-weight:700; }
  .msg em{ opacity:0.88; }
  .msg blockquote{
    margin:6px 0 10px; padding:2px 12px; border-left:2px solid rgba(94,234,212,0.4);
    color:rgba(243,244,255,0.72); font-style:italic;
  }
  .msg hr{ border:none; border-top:1px solid var(--line); margin:10px 0; }
  .msg a{ color:var(--nebula-cyan); text-decoration:underline; text-underline-offset:2px; }
  .msg a:hover{ color:var(--nebula-violet); }
  .msg code{
    background:rgba(94,234,212,0.12); border:1px solid rgba(94,234,212,0.18);
    padding:1.5px 6px; border-radius:5px; font-size:0.85em; font-family:'IBM Plex Mono', monospace;
  }
  .msg pre{
    background:rgba(5,7,13,0.55); border:1px solid var(--line); border-radius:9px;
    padding:11px 13px; overflow-x:auto; margin:8px 0 10px; line-height:1.5;
  }
  .msg pre code{ background:none; border:none; padding:0; font-size:0.82rem; white-space:pre; }
  .msg table{ border-collapse:collapse; margin:6px 0 10px; font-size:0.85rem; width:100%; }
  .msg th, .msg td{ border:1px solid var(--line); padding:5px 9px; text-align:left; }
  .msg th{ color:var(--star); font-family:'Space Grotesk',sans-serif; }
  .msg.user{
    background:linear-gradient(155deg, rgba(94,234,212,0.18), rgba(94,234,212,0.09));
    border:1px solid rgba(94,234,212,0.32); border-bottom-right-radius:4px;
  }
  .msg.ai{
    background:linear-gradient(155deg, rgba(139,124,246,0.13), rgba(139,124,246,0.05));
    border:1px solid rgba(139,124,246,0.24); border-bottom-left-radius:4px;
  }
  .msg.error{ background:rgba(232,121,249,0.1); border:1px solid rgba(232,121,249,0.35); color:#f6d3fb; }
  .msg-row.admin{ align-self:center; align-items:center; max-width:92%; }
  .tag.admin-tag{ color:#f2c94c; }
  .msg.admin{
    background:linear-gradient(155deg, rgba(242,201,76,0.16), rgba(242,201,76,0.06));
    border:1px solid rgba(242,201,76,0.4); border-radius:10px; text-align:center;
    font-weight:600;
  }
  .msg img{ max-width:100%; max-height:280px; border-radius:8px; margin-top:8px; display:block; }
  .msg.thinking{ color:rgba(243,244,255,0.45); font-style:italic; }
  .msg.typing::after{
    content:''; display:inline-block; width:2px; height:0.95em;
    background:var(--nebula-cyan); margin-left:2px; vertical-align:-0.15em;
    animation:caretBlink 0.85s steps(1) infinite;
  }
  .msg.typing{ cursor:pointer; }
  @keyframes caretBlink{ 50%{ opacity:0; } }
  .dots span{ animation: blink 1.3s infinite; }
  .dots span:nth-child(2){ animation-delay:0.2s; }
  .dots span:nth-child(3){ animation-delay:0.4s; }
  @keyframes blink{ 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

  /* code file cards */
  .filecard{
    margin-top:10px; border:1px solid rgba(94,234,212,0.25); border-radius:10px;
    overflow:hidden; background:rgba(5,7,13,0.55); width:100%;
  }
  .filecard-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:7px 12px; background:rgba(94,234,212,0.08);
    font-family:'Space Grotesk',sans-serif; font-size:0.76rem; font-weight:600;
    color:var(--nebula-cyan); border-bottom:1px solid rgba(94,234,212,0.18);
  }
  .filecard-header .lang{ color:rgba(243,244,255,0.4); font-weight:500; text-transform:uppercase; font-size:0.65rem; }
  .filecard pre{ margin:0; padding:12px; max-height:260px; overflow:auto; font-size:0.8rem; line-height:1.5; white-space:pre; }
  .filecard code{ word-break:normal; }
  .filecard-actions{ display:flex; gap:6px; padding:7px 10px; border-top:1px solid rgba(94,234,212,0.14); }
  .filecard-actions button{
    background:transparent; border:1px solid var(--line); color:var(--star);
    border-radius:6px; padding:5px 10px; font-family:'IBM Plex Mono'; font-size:0.72rem; cursor:pointer;
  }
  .filecard-actions button:hover{ border-color:var(--nebula-cyan); color:var(--nebula-cyan); }
  .msg-actions{ display:flex; gap:8px; margin-top:10px; }
  .msg-actions button{
    background:rgba(139,124,246,0.14); border:1px solid rgba(139,124,246,0.4); color:var(--star);
    border-radius:7px; padding:7px 12px; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:0.76rem; cursor:pointer;
  }
  .msg-actions button:hover{ background:rgba(139,124,246,0.28); }

  /* preview modal */
  #previewOverlay{
    position:fixed; inset:0; background:rgba(2,3,8,0.75); backdrop-filter:blur(4px);
    display:none; align-items:center; justify-content:center; z-index:50; padding:24px;
  }
  #previewBox{
    width:min(1000px, 96vw); height:min(720px, 88vh); background:#0b0e18;
    border:1px solid rgba(94,234,212,0.3); border-radius:12px; overflow:hidden;
    display:flex; flex-direction:column; box-shadow:0 30px 80px rgba(0,0,0,0.6);
  }
  #previewBar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 14px; background:rgba(94,234,212,0.08); border-bottom:1px solid rgba(94,234,212,0.2);
    font-family:'Space Grotesk',sans-serif; font-size:0.8rem; color:var(--nebula-cyan);
  }
  #previewBar button{ background:transparent; border:1px solid var(--line); color:var(--star); border-radius:6px; padding:5px 10px; cursor:pointer; font-family:'IBM Plex Mono'; font-size:0.75rem; }
  #previewFrame{ flex:1; border:none; width:100%; background:#fff; }

  .inputbar{ border-top:1px solid var(--line); padding:16px 18px; background:rgba(0,0,0,0.18); }
  #imgPreviewWrap{ display:none; position:relative; margin-bottom:10px; width:fit-content; max-width:100%; }
  #imgPreview{ max-height:84px; border-radius:6px; border:1px solid var(--line); display:block; }
  #imgPreview.hidden{ display:none; }
  #vidPreview{ display:none; max-height:84px; border-radius:6px; border:1px solid var(--line); }
  #filePreviewChip{
    display:none; align-items:center; gap:9px; padding:8px 34px 8px 12px;
    background:rgba(94,234,212,0.08); border:1px solid var(--line); border-radius:9px;
    font-family:'Space Grotesk',sans-serif; font-size:0.78rem; max-width:340px;
  }
  #filePreviewChip .fp-icon{ font-size:1.3rem; flex:none; }
  #filePreviewChip .fp-meta{ min-width:0; }
  #filePreviewChip .fp-name{ color:var(--star); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #filePreviewChip .fp-size{ color:rgba(243,244,255,0.45); font-size:0.7rem; margin-top:2px; }
  #removeImg{
    position:absolute; top:-7px; right:-7px; background:var(--nebula-magenta); color:#1a0d1e;
    border:none; border-radius:50%; width:19px; height:19px; font-size:11px; cursor:pointer; line-height:1;
  }
  .msg video{ max-width:260px; max-height:220px; border-radius:8px; display:block; margin-top:6px; }
  .msg .filechip-inline{
    display:inline-flex; align-items:center; gap:7px; margin-top:6px; padding:7px 12px;
    background:rgba(243,244,255,0.06); border:1px solid var(--line); border-radius:8px; font-size:0.82rem;
  }
  .inputrow{ display:flex; gap:10px; width:100%; align-items:flex-end; }
  #textInput{
    flex:1; background:rgba(5,7,13,0.6); border:1px solid var(--line); border-radius:9px;
    color:var(--star); font-family:'IBM Plex Mono'; padding:12px 14px; font-size:16px;
    resize:none; max-height:140px; line-height:1.4;
  }
  #textInput:focus{ outline:none; border-color:var(--nebula-cyan); }
  button.icon{
    background:transparent; border:1px solid var(--line); color:var(--star);
    border-radius:9px; width:44px; height:44px; cursor:pointer; font-size:1.15rem; flex:none;
    transition:border-color .15s, color .15s, background .15s;
  }
  button.icon:hover{ border-color:var(--nebula-violet); color:var(--nebula-violet); }
  #sendBtn{ border-color:var(--nebula-cyan); color:var(--nebula-cyan); }
  #sendBtn.admin-active{ border-color:#f2c94c; color:#f2c94c; }
  #sendBtn:hover{ background:var(--nebula-cyan); color:#04211d; }
  #sendBtn:disabled, button.icon:disabled{ opacity:0.4; cursor:not-allowed; }
  #fileInput{ display:none; }
  .note{ text-align:center; font-size:0.72rem; color:rgba(243,244,255,0.4); margin-top:12px; max-width:900px; margin-left:auto; margin-right:auto; line-height:1.5; position:relative; z-index:1; }

  body[data-bg]:not([data-bg="nebula"]) .nebula{ display:none; }

  .chatbar-icon-btn{
    background:rgba(243,244,255,0.06); border:1px solid var(--line); color:var(--star);
    border-radius:8px; width:30px; height:30px; cursor:pointer; font-size:0.95rem;
    display:flex; align-items:center; justify-content:center; flex:none;
    transition:border-color .15s, color .15s, background .15s;
  }

<script type="module">
// ================= firebase =================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAnalytics, isSupported as analyticsIsSupported } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-analytics.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously,
  onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, getDocs, collection, query, orderBy,
  deleteDoc, serverTimestamp, limit
} from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDw6pLOlPOdbMtMigBMEC_qwPS7UMCxw4c",
  authDomain: "ai121-90867.firebaseapp.com",
  projectId: "ai121-90867",
  storageBucket: "ai121-90867.firebasestorage.app",
  messagingSenderId: "1038216767214",
  appId: "1:1038216767214:web:63c3ee2c24c211213035ff",
  measurementId: "G-RN1E4YTC03"
};
const fbApp = initializeApp(firebaseConfig);
analyticsIsSupported().then(ok=>{ if(ok){ try{ getAnalytics(fbApp); }catch(e){} } });
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const googleProvider = new GoogleAuthProvider();

// ================= animated background system =================
const starCanvas = document.getElementById('stars');
const sctx = starCanvas.getContext('2d');
let W, H, stars = [];
let bgMode = localStorage.getItem('cvai_bg') || 'nebula';
document.body.setAttribute('data-bg', bgMode);

let matrixCols = [];
let constellationParticles = [];
let bubbleParticles = [];
let geoShapes = [];

function resizeCanvas(){ W = starCanvas.width = window.innerWidth; H = starCanvas.height = window.innerHeight; }

function initModeState(){
  if(bgMode === 'matrix'){
    const fontSize = 15;
    const cols = Math.max(1, Math.floor(W/fontSize));
    matrixCols = new Array(cols).fill(0).map(()=> Math.random()*H/fontSize);
  } else if(bgMode === 'constellation'){
    const count = Math.floor((W*H)/16000);
    constellationParticles = Array.from({length:count}, ()=>({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5
    }));
  } else if(bgMode === 'bubbles'){
    const count = Math.floor((W*H)/22000);
    bubbleParticles = Array.from({length:count}, ()=>({
      x:Math.random()*W, y:H+Math.random()*H, r:6+Math.random()*22,
      speed:0.3+Math.random()*1.1, wobble:Math.random()*Math.PI*2, wobbleSpeed:0.01+Math.random()*0.02,
      hue:[160,265,300][Math.floor(Math.random()*3)], alpha:0.08+Math.random()*0.18
    }));
  } else if(bgMode === 'geo'){
    const count = Math.floor((W*H)/45000);
    geoShapes = Array.from({length:count}, ()=>({
      x:Math.random()*W, y:Math.random()*H, size:14+Math.random()*34,
      rot:Math.random()*Math.PI*2, rotSpeed:(Math.random()-0.5)*0.012,
      vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
      sides:[3,4,6][Math.floor(Math.random()*3)],
      hue:[160,265,300][Math.floor(Math.random()*3)]
    }));
  } else if(bgMode === 'nebula'){
    initStars();
  }
}

function initStars(){
  const count = Math.floor((W*H)/9000);
  stars = [];
  for(let i=0;i<count;i++){
    stars.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.3+0.3,
      baseAlpha:Math.random()*0.6+0.3, twinkleSpeed:Math.random()*0.02+0.005,
      phase:Math.random()*Math.PI*2, driftY:Math.random()*0.06+0.02 });
  }
}

let shootingStar = null;
function maybeSpawnShootingStar(){
  if(!shootingStar && Math.random() < 0.004){
    shootingStar = { x:Math.random()*W*0.6, y:-10, vx:4+Math.random()*3, vy:3+Math.random()*2, life:0, maxLife:60 };
  }
}
function drawNebula(t){
  for(const s of stars){
    s.y += s.driftY; if(s.y > H) s.y = 0;
    const alpha = s.baseAlpha * (0.6 + 0.4*Math.sin(t*s.twinkleSpeed*20 + s.phase));
    sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sctx.fillStyle = `rgba(243,244,255,${alpha})`; sctx.fill();
  }
  maybeSpawnShootingStar();
  if(shootingStar){
    const ss = shootingStar; ss.x += ss.vx; ss.y += ss.vy; ss.life++;
    const grad = sctx.createLinearGradient(ss.x, ss.y, ss.x-ss.vx*8, ss.y-ss.vy*8);
    grad.addColorStop(0, 'rgba(243,244,255,0.9)'); grad.addColorStop(1, 'rgba(243,244,255,0)');
    sctx.strokeStyle = grad; sctx.lineWidth = 1.6;
    sctx.beginPath(); sctx.moveTo(ss.x, ss.y); sctx.lineTo(ss.x-ss.vx*8, ss.y-ss.vy*8); sctx.stroke();
    if(ss.life > ss.maxLife || ss.x > W || ss.y > H) shootingStar = null;
  }
}

function drawMatrix(){
  sctx.fillStyle = 'rgba(5,7,13,0.16)';
  sctx.fillRect(0,0,W,H);
  const fontSize = 15;
  sctx.font = fontSize + 'px monospace';
  matrixCols.forEach((y,i)=>{
    const char = String.fromCharCode(0x30A0 + Math.floor(Math.random()*96));
    const x = i*fontSize;
    sctx.fillStyle = Math.random() > 0.985 ? '#F3F4FF' : 'rgba(94,234,212,0.75)';
    sctx.fillText(char, x, y*fontSize);
    matrixCols[i] = (y*fontSize > H && Math.random() > 0.975) ? 0 : y + 0.7;
  });
}

function drawConstellation(){
  constellationParticles.forEach(p=>{
    p.x += p.vx; p.y += p.vy;
    if(p.x < 0 || p.x > W) p.vx *= -1;
    if(p.y < 0 || p.y > H) p.vy *= -1;
  });
  for(let i=0;i<constellationParticles.length;i++){
    const a = constellationParticles[i];
    sctx.beginPath(); sctx.arc(a.x, a.y, 1.6, 0, Math.PI*2);
    sctx.fillStyle = 'rgba(139,124,246,0.8)'; sctx.fill();
    for(let j=i+1;j<constellationParticles.length;j++){
      const b = constellationParticles[j];
      const dx = a.x-b.x, dy = a.y-b.y, dist = Math.sqrt(dx*dx+dy*dy);
      if(dist < 130){
        sctx.strokeStyle = `rgba(94,234,212,${0.18*(1-dist/130)})`;
        sctx.lineWidth = 1;
        sctx.beginPath(); sctx.moveTo(a.x,a.y); sctx.lineTo(b.x,b.y); sctx.stroke();
      }
    }
  }
}

function drawBubbles(){
  bubbleParticles.forEach(p=>{
    p.y -= p.speed;
    p.wobble += p.wobbleSpeed;
    const x = p.x + Math.sin(p.wobble)*14;
    if(p.y < -p.r){ p.y = H + p.r; p.x = Math.random()*W; }
    sctx.beginPath();
    sctx.arc(x, p.y, p.r, 0, Math.PI*2);
    sctx.strokeStyle = `hsla(${p.hue},80%,70%,${p.alpha+0.15})`;
    sctx.fillStyle = `hsla(${p.hue},80%,70%,${p.alpha})`;
    sctx.lineWidth = 1.3;
    sctx.fill(); sctx.stroke();
  });
}

function drawGeo(){
  geoShapes.forEach(s=>{
    s.x += s.vx; s.y += s.vy; s.rot += s.rotSpeed;
    if(s.x < -50) s.x = W+50; if(s.x > W+50) s.x = -50;
    if(s.y < -50) s.y = H+50; if(s.y > H+50) s.y = -50;
    sctx.save();
    sctx.translate(s.x, s.y); sctx.rotate(s.rot);
    sctx.beginPath();
    for(let k=0;k<s.sides;k++){
      const ang = (k/s.sides)*Math.PI*2;
      const px = Math.cos(ang)*s.size, py = Math.sin(ang)*s.size;
      if(k===0) sctx.moveTo(px,py); else sctx.lineTo(px,py);
    }
    sctx.closePath();
    sctx.strokeStyle = `hsla(${s.hue},80%,70%,0.35)`;
    sctx.lineWidth = 1.4;
    sctx.stroke();
    sctx.restore();
  });
}

function drawAurora(t){
  const bands = [
    { hue:265, amp:60, speed:0.4, yBase:H*0.3 },
    { hue:180, amp:80, speed:0.3, yBase:H*0.5 },
    { hue:300, amp:50, speed:0.5, yBase:H*0.7 }
  ];
  bands.forEach((band,bi)=>{
    sctx.beginPath();
    for(let x=0; x<=W; x+=12){
      const y = band.yBase + Math.sin(x*0.006 + t*band.speed + bi) * band.amp;
      if(x===0) sctx.moveTo(x,y); else sctx.lineTo(x,y);
    }
    sctx.lineTo(W,H); sctx.lineTo(0,H); sctx.closePath();
    const grad = sctx.createLinearGradient(0, band.yBase-band.amp, 0, H);
    grad.addColorStop(0, `hsla(${band.hue},85%,65%,0.22)`);
    grad.addColorStop(1, `hsla(${band.hue},85%,65%,0)`);
    sctx.fillStyle = grad;
    sctx.fill();
  });
}

function renderFrame(){
  const t = Date.now()*0.001;
  if(bgMode === 'matrix'){
    drawMatrix();
  } else {
    sctx.clearRect(0,0,W,H);
    if(bgMode === 'constellation') drawConstellation();
    else if(bgMode === 'bubbles') drawBubbles();
    else if(bgMode === 'geo') drawGeo();
    else if(bgMode === 'aurora') drawAurora(t);
    else drawNebula(t);
  }
  requestAnimationFrame(renderFrame);
}

resizeCanvas(); initModeState();
window.addEventListener('resize', ()=>{ resizeCanvas(); initModeState(); });
renderFrame();

function setBgMode(mode){
  bgMode = mode;
  document.body.setAttribute('data-bg', mode);
  localStorage.setItem('cvai_bg', mode);
  initModeState();
  document.querySelectorAll('.bg-opt').forEach(b=> b.classList.toggle('active', b.dataset.bg === mode));
  if(currentUser){
    setDoc(doc(db,'users',currentUser.uid,'prefs','settings'), { bgMode: mode }, { merge:true }).catch(()=>{});
  }
}
const bgPickerBtn = document.getElementById('bgPickerBtn');
const bgPickerPanel = document.getElementById('bgPickerPanel');
bgPickerBtn.onclick = (e)=>{ e.stopPropagation(); bgPickerPanel.classList.toggle('show'); };

// Vercel serverless functions hard-cap request bodies at 4.5MB, and base64
// inflates raw bytes by ~33%. 3MB raw stays safely under that after encoding
// plus JSON/history overhead. (18MB previously here would 413 on real hosting.)
const MAX_ATTACHMENT_BYTES = 3 * 1024 * 1024;

const EXT_MIME_FALLBACK = {
  pdf:'application/pdf', txt:'text/plain', md:'text/markdown', csv:'text/csv',
  json:'application/json', html:'text/html', css:'text/css', js:'text/javascript',
  py:'text/x-python', xml:'text/xml', rtf:'application/rtf'
};

function guessMimeType(file){
  if(file.type) return file.type;
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  return EXT_MIME_FALLBACK[ext] || 'application/octet-stream';
}

function kindOf(mimeType){
  if(mimeType.startsWith('image/')) return 'image';
  if(mimeType.startsWith('video/')) return 'video';
  if(mimeType.startsWith('audio/')) return 'audio';
  return 'file';
}

function formatBytes(bytes){
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/(1024*1024)).toFixed(1) + ' MB';
}

attachBtn.onclick = ()=> fileInput.click();
fileInput.onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  attachBtn.disabled = true;
  try{
    if(file.size > MAX_ATTACHMENT_BYTES){
      throw new Error(`file is ${formatBytes(file.size)} — please attach something under ${formatBytes(MAX_ATTACHMENT_BYTES)}`);
    }
    const mimeType = guessMimeType(file);
    const kind = kindOf(mimeType);
    let attachment;
    if(kind === 'image'){
      attachment = await resizeImage(file, 1024, 0.85);
    } else {
      attachment = await readFileAsBase64(file, mimeType);
    }
    attachment.kind = kind;
    attachment.name = file.name;
    attachment.size = file.size;
    pendingAttachment = attachment;
    showAttachmentPreview(attachment);
  }catch(err){
    addPlainMessage('ai', 'Could not attach that file: ' + err.message, true);
  }
  attachBtn.disabled = false;
};

async function openCamera(){
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    addPlainMessage('ai', 'Camera access is not supported in this browser.', true);
    return;
  }
  try{
    cameraStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode: cameraFacingMode }, audio:false });
    cameraVideo.srcObject = cameraStream;
    cameraOverlay.classList.add('show');
  }catch(err){
    addPlainMessage('ai', 'Could not access the camera: ' + err.message, true);
  }
}
function stopCamera(){
  if(cameraStream){ cameraStream.getTracks().forEach(t=> t.stop()); cameraStream = null; }
  cameraOverlay.classList.remove('show');
}
cameraBtn.onclick = openCamera;
cameraClose.onclick = stopCamera;
cameraSwitch.onclick = async ()=>{
  cameraFacingMode = cameraFacingMode === 'environment' ? 'user' : 'environment';
  if(cameraStream) cameraStream.getTracks().forEach(t=> t.stop());
  try{
    cameraStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode: cameraFacingMode }, audio:false });
    cameraVideo.srcObject = cameraStream;
  }catch(err){
    addPlainMessage('ai', 'Could not switch camera: ' + err.message, true);
  }
};
cameraShutter.onclick = ()=>{
  if(!cameraVideo.videoWidth) return;
  const canvas = document.createElement('canvas');
  canvas.width = cameraVideo.videoWidth;
  canvas.height = cameraVideo.videoHeight;
  canvas.getContext('2d').drawImage(cameraVideo, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  pendingAttachment = {
    kind:'image', mediaType:'image/jpeg', base64: dataUrl.split(',')[1], dataUrl,
    name:'camera-photo.jpg', size: Math.round(dataUrl.length*0.75)
  };
  showAttachmentPreview(pendingAttachment);
  stopCamera();
};

  if(!currentUser || history.length === 0) return;
  if(!currentSessionId) currentSessionId = crypto.randomUUID();

  const slimMessages = history.map(turn=>{
    if(typeof turn.content === 'string') return { role: turn.role, content: turn.content };
    const textBlock = turn.content.find(b=> b.type === 'text');
    return { role: turn.role, content: textBlock ? textBlock.text : '[attachment]' };

  const title = isDefaultTitle ? (slimMessages[0] ? slimMessages[0].content.slice(0,40) : 'New chat') : chatTitle.textContent;

    await setDoc(doc(db,'users',currentUser.uid,'sessions',currentSessionId), {
      title, messages: slimMessages, updatedAt: serverTimestamp()
    });

  }catch(e){ /* ignore save failures silently */ }
}

function resizeImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      let { width, height } = img;
      if(width > maxDim || height > maxDim){
        const scale = Math.min(maxDim/width, maxDim/height);
        width = Math.round(width*scale); height = Math.round(height*scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL('image/jpeg', quality);
      URL.revokeObjectURL(url);
      resolve({ mediaType:'image/jpeg', base64: dataUrl.split(',')[1], dataUrl });
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error('failed to load image')); };
    img.src = url;
  });
}

function readFileAsBase64(file, mimeType){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const dataUrl = reader.result;
      resolve({ mediaType: mimeType, base64: dataUrl.split(',')[1], dataUrl });
    };
    reader.onerror = ()=> reject(new Error('failed to read file'));
    reader.readAsDataURL(file);
  });
}

    pre.parentNode.insertBefore(bar, pre);
    pre.classList.add('has-bar');
  });

const THINKING_PHRASES = [
  'Reading your message…',
  'Thinking…',
  'Considering the best way to answer…',
  'Putting a reply together…',
  'Almost there…'
];
function startThinkingCycle(el){
  let i = 0;
  el.textContent = THINKING_PHRASES[0];
  const interval = setInterval(()=>{
    i = (i+1) % THINKING_PHRASES.length;
    el.style.opacity = '0';
    setTimeout(()=>{ el.textContent = THINKING_PHRASES[i]; el.style.opacity = '1'; }, 200);
  }, 1900);
  return ()=> clearInterval(interval);

// ---- fast "typing" reveal for AI text, re-parses markdown as characters are added ----
const TYPE_CHARS_PER_SEC = 950;
const TYPE_MAX_DURATION_MS = 2600; // long responses type out faster so they never feel sluggish
let activeSkipTyping = null;
function typeMarkdownInto(el, fullText){
  return new Promise(resolve=>{
    if(!fullText){ resolve(); return; }
    let done = false;
    const start = performance.now();
    const durationMs = Math.min(TYPE_MAX_DURATION_MS, Math.max(350, (fullText.length/TYPE_CHARS_PER_SEC)*1000));
    const effectiveCharsPerSec = fullText.length / (durationMs/1000);
    let lastCount = -1;
    el.classList.add('typing');
    el.title = 'Click to show full response';
    function finish(){
      if(done) return;
      done = true;
      setMarkdownContent(el, fullText);
      el.classList.remove('typing');
      el.removeAttribute('title');
      el.removeEventListener('click', finish);
      enhanceCodeBlocks(el);
      if(activeSkipTyping === finish) activeSkipTyping = null;
      resolve();
    }
    el.addEventListener('click', finish);
    activeSkipTyping = finish;
    function step(now){
      if(done) return;
      const elapsed = now - start;
      const count = Math.min(fullText.length, Math.ceil(elapsed/1000*effectiveCharsPerSec));
      if(count !== lastCount){
        lastCount = count;
        setMarkdownContent(el, fullText.slice(0, count));
        if(messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 120){
          messagesEl.scrollTop = messagesEl.scrollHeight;
        }
      }
      if(count < fullText.length) requestAnimationFrame(step);
      else finish();
    }
    requestAnimationFrame(step);
  });
}

function addPlainMessage(role, text, isError, attachment){
  const row = document.createElement('div');
  const kind = role.includes('admin') ? 'admin' : (role.includes('user') ? 'user' : 'ai');
  row.className = 'msg-row ' + kind;
  const isThinking = role.includes('thinking');
  const tag = document.createElement('div');
  tag.className = 'tag' + (kind === 'admin' ? ' admin-tag' : '');
  const tagLabel = document.createElement('span');
  tagLabel.textContent = kind === 'admin' ? 'ADMIN' : (kind === 'user' ? 'You' : 'AI');
  tag.appendChild(tagLabel);
  if(!isThinking){
    const timeSpan = document.createElement('span');
    timeSpan.className = 'msg-time';
    timeSpan.textContent = formatTime(new Date());
    tag.appendChild(timeSpan);
  }
  row.appendChild(tag);
  const div = document.createElement('div');
  div.className = 'msg ' + role + (isError ? ' error' : '');
  const shouldType = kind === 'ai' && !isThinking && !!text;
  if(text){
    if(shouldType){
      typeMarkdownInto(div, text);
    } else {
      setMarkdownContent(div, text);
      if(kind === 'ai' && !isThinking) enhanceCodeBlocks(div);
    }
  }
  if(attachment){
    if(attachment.kind === 'image'){
      const img = document.createElement('img'); img.src = attachment.dataUrl; div.appendChild(img);
    } else if(attachment.kind === 'video'){
      const vid = document.createElement('video'); vid.src = attachment.dataUrl; vid.controls = true; div.appendChild(vid);
    } else {
      const chip = document.createElement('div');
      chip.className = 'filechip-inline';
      const icon = attachment.kind === 'audio' ? '🎵' : '📄';
      chip.innerHTML = `<span>${icon}</span><span>${attachment.name || 'attachment'}</span>`;
      div.appendChild(chip);
    }
  }
  row.appendChild(div);
  if(kind === 'ai' && !isThinking && text){
    addMsgToolbar(row, ()=> text);
  }
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return row;
}

// ---- parse "**filename.ext**\n```lang\ncode\n```" blocks out of AI text ----
function parseFiles(text){
  const re = /\*\*([\w./-]+\.\w+)\*\*\s*\n```(\w*)\n([\s\S]*?)```/g;
  const files = [];
  let lastIndex = 0;
  const segments = [];
  let match;
  while((match = re.exec(text)) !== null){
    if(match.index > lastIndex) segments.push({type:'text', content: text.slice(lastIndex, match.index)});
    const file = { name: match[1], lang: match[2] || '', content: match[3] };
    files.push(file);
    segments.push({type:'file', file});
    lastIndex = re.lastIndex;
  }
  if(lastIndex < text.length) segments.push({type:'text', content: text.slice(lastIndex)});
  return { segments, files };
}

function extOf(name){ const p = name.split('.'); return p[p.length-1].toLowerCase(); }

async function renderAssistantMessage(text, isNew){
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  const tag = document.createElement('div');
  tag.className = 'tag';
  const tagLabel = document.createElement('span'); tagLabel.textContent = 'AI';
  const timeSpan = document.createElement('span'); timeSpan.className = 'msg-time'; timeSpan.textContent = formatTime(new Date());
  tag.appendChild(tagLabel); tag.appendChild(timeSpan);
  row.appendChild(tag);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  const { segments, files } = parseFiles(text);

  if(files.length === 0){
    const div = document.createElement('div');
    div.className = 'msg ai';
    row.appendChild(div);
    await typeMarkdownInto(div, text);
  } else {
    const wrap = document.createElement('div');
    wrap.style.width = '100%';
    row.appendChild(wrap);
    for(const seg of segments){
      if(seg.type === 'text'){
        const trimmed = seg.content.replace(/^\n+|\n+$/g,'');
        if(trimmed){
          const div = document.createElement('div');
          div.className = 'msg ai'; div.style.marginBottom='4px';
          wrap.appendChild(div);
          await typeMarkdownInto(div, trimmed);
        }
      } else {
        wrap.appendChild(buildFileCard(seg.file));
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }
    // message-level actions
    const actions = document.createElement('div');
    actions.className = 'msg-actions';

    const hasHtml = files.some(f=> extOf(f.name)==='html');
    if(hasHtml){
      const previewBtn = document.createElement('button');
      previewBtn.textContent = '▶ Live preview';
      previewBtn.onclick = ()=> openPreview(files);
      actions.appendChild(previewBtn);
    }
    const zipBtn = document.createElement('button');
    zipBtn.textContent = files.length > 1 ? '⬇ Download .zip' : '⬇ Download file';
    zipBtn.onclick = ()=> downloadZip(files);
    actions.appendChild(zipBtn);

    wrap.appendChild(actions);
  }
  addMsgToolbar(row, ()=> text, { showRegenerate: !!isNew });
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function buildFileCard(file){
  const card = document.createElement('div');
  card.className = 'filecard';
  const header = document.createElement('div');
  header.className = 'filecard-header';
  header.innerHTML = `<span>${file.name}</span><span class="lang">${file.lang || extOf(file.name)}</span>`;
  const pre = document.createElement('pre');
  const code = document.createElement('code');
  code.textContent = file.content;
  pre.appendChild(code);
  const actions = document.createElement('div');
  actions.className = 'filecard-actions';
  const copyBtn = document.createElement('button');
  copyBtn.textContent = 'Copy';
  copyBtn.onclick = ()=>{ navigator.clipboard.writeText(file.content); copyBtn.textContent='Copied'; setTimeout(()=>copyBtn.textContent='Copy',1200); };
  const dlBtn = document.createElement('button');
  dlBtn.textContent = 'Download';
  dlBtn.onclick = ()=> downloadSingle(file);
  actions.appendChild(copyBtn); actions.appendChild(dlBtn);
  card.appendChild(header); card.appendChild(pre); card.appendChild(actions);
  return card;
}

function downloadSingle(file){
  const blob = new Blob([file.content], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = file.name; a.click();
  URL.revokeObjectURL(url);
}

async function downloadZip(files){
  if(files.length === 1){ downloadSingle(files[0]); return; }
  const zip = new JSZip();
  files.forEach(f=> zip.file(f.name, f.content));
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'project.zip'; a.click();
  URL.revokeObjectURL(url);
}

function openPreview(files){
  const htmlFile = files.find(f=> extOf(f.name)==='html');
  if(!htmlFile) return;
  let html = htmlFile.content;
  const byName = {}; files.forEach(f=> byName[f.name]=f.content);
  // inline any css files linked by <link href="name.css">
  html = html.replace(/<link[^>]+href=["']([^"']+\.css)["'][^>]*>/g, (m, href)=>{
    const key = Object.keys(byName).find(n=> n===href || n.endsWith('/'+href));
    return key ? `<style>\n${byName[key]}\n</style>` : m;
  });
  // inline any js files linked by <script src="name.js">
  html = html.replace(/<script[^>]+src=["']([^"']+\.js)["'][^>]*><\/script>/g, (m, src)=>{
    const key = Object.keys(byName).find(n=> n===src || n.endsWith('/'+src));
    return key ? `<script>\n${byName[key]}\n<\/script>` : m;
  });
  previewFrame.srcdoc = html;
  previewOverlay.style.display = 'flex';
}

function setBusy(state){
  busy = state;
  attachBtn.disabled = state; cameraBtn.disabled = state; textInput.disabled = state;
  sendBtn.disabled = false;
  if(state){
    sendBtn.classList.add('stop-mode');
    sendBtn.title = 'Stop';
    sendBtn.textContent = '■';
  } else {
    sendBtn.classList.remove('stop-mode');
    sendBtn.title = 'Send';
    sendBtn.textContent = '➤';
  }
}

// Convert our internal history (Anthropic-style blocks) into Gemini's "contents" format
function toGeminiContents(hist){
  return hist.map(turn=>{
    const role = turn.role === 'user' ? 'user' : 'model';
    let parts;
    if(typeof turn.content === 'string'){
      parts = [{ text: turn.content }];
    } else {
      parts = turn.content.map(block=>{
        if(block.type === 'text') return { text: block.text };
        if(block.source) return { inline_data: { mime_type: block.source.media_type, data: block.source.data } };
        return { text: '' };
      });
    }
    return { role, parts };
  });
}

async function send(){
  if(busy) return;
  const text = textInput.value.trim();
  if(!text && !pendingAttachment) return;

  if(!pendingAttachment && text.toUpperCase() === ADMIN_PASSCODE){
    adminMode = !adminMode;
    updateAdminIndicator();
    textInput.value = ''; textInput.style.height = 'auto';
    addPlainMessage('admin', adminMode ? 'Admin mode enabled.' : 'Admin mode disabled.');
    return;
  }

  if(adminMode && !pendingAttachment && text.startsWith('/')){
    const spaceIdx = text.indexOf(' ');
    const cmd = (spaceIdx === -1 ? text : text.slice(0, spaceIdx)).toLowerCase();
    const arg = (spaceIdx === -1 ? '' : text.slice(spaceIdx + 1)).trim();
    textInput.value = ''; textInput.style.height = 'auto';

    if(cmd === '/announce' || cmd === '/broadcast'){
      if(arg){ showAnnouncement(arg); addPlainMessage('admin', arg + ' (shown only in this browser — see /help)'); }
      else addPlainMessage('admin', 'Usage: /announce <message> — pops a dismissible banner in this browser only, without pinging the AI.');
      return;
    }
    if(cmd === '/clear' || cmd === '/wipe'){
      messagesEl.innerHTML = ''; history = []; hideAnnouncement();
      addPlainMessage('admin', 'Chat cleared.');
      return;
    }
    if(cmd === '/title' || cmd === '/rename'){
      if(arg){ chatTitle.textContent = arg; addPlainMessage('admin', 'Session title set to "' + arg + '".'); }
      else addPlainMessage('admin', 'Usage: /title <new title>');
      return;
    }
    if(cmd === '/lock'){
      lockChat(arg);
      addPlainMessage('admin', '🔒 Chat locked in this browser' + (arg ? (' — "' + arg + '"') : '') + '. Note: this is a local preview only — it does not lock the chat for other visitors, since there\'s no shared backend for admin state yet.');
      return;
    }
    if(cmd === '/unlock'){
      if(!chatLocked){ addPlainMessage('admin', 'Chat is not currently locked.'); return; }
      unlockChat();
      addPlainMessage('admin', '🔓 Chat unlocked in this browser.');
      return;
    }
    if(cmd === '/ratelimit' || cmd === '/quotalock'){
      lockChat(RATE_LIMIT_LOCK_MESSAGE);
      addPlainMessage('admin', '🔒 Locked in this browser with the free-plan rate-limit notice (local preview only, see /help).');
      return;
    }
    if(cmd === '/status'){
      addPlainMessage('admin',
        'Status — Admin mode: ON. Chat lock: ' + (chatLocked ? ('LOCKED ("' + lockMessage + '")') : 'unlocked') +
        '. Messages in session: ' + history.length + '. Title: "' + chatTitle.textContent + '".'
      );
      return;
    }
    if(cmd === '/theme'){
      const presets = { cyan:'#5EEAD4', violet:'#8B7CF6', magenta:'#E879F9', amber:'#f2c94c' };
      const color = presets[arg.toLowerCase()] || (/^#[0-9a-f]{3,8}$/i.test(arg) ? arg : null);
      if(color){ document.documentElement.style.setProperty('--nebula-cyan', color); addPlainMessage('admin', 'Accent theme updated.'); }
      else addPlainMessage('admin', 'Usage: /theme <cyan|violet|magenta|amber|#hexcode>');
      return;
    }
    if(cmd === '/export'){
      exportTranscript();
      addPlainMessage('admin', 'Transcript downloaded.');
      return;
    }
    if(cmd === '/off'){
      adminMode = false; updateAdminIndicator();
      addPlainMessage('admin', 'Admin mode disabled.');
      return;
    }
    if(cmd === '/help' || cmd === '/commands'){
      addPlainMessage('admin',
        'Admin commands — ⚠️ note: this app has no backend for shared admin state, so /lock and /announce only affect this browser/tab, not other visitors. ' +
        '/lock [reason]: lock the chat in this browser (e.g. to preview the free-plan quota message). ' +
        '/unlock: re-enable chat in this browser. ' +
        '/ratelimit: quick-lock with a preset free-plan quota message. ' +
        '/announce (or /broadcast) <text>: dismissible banner in this browser, no AI reply. ' +
        '/clear (or /wipe): wipe this chat. ' +
        '/title (or /rename) <text>: rename the session. ' +
        '/theme <cyan|violet|magenta|amber|#hex>: change accent color. ' +
        '/export: download the transcript as a .txt file. ' +
        '/status: show admin/lock/session state. ' +
        '/off or retype the admin passcode: exit admin mode. ' +
        'Anything else you type is sent to the AI as an announcement.'
      );
      return;
    }
    addPlainMessage('admin', 'Unknown command "' + cmd + '". Type /help for the list.');
    return;
  }

  if(chatLocked && !adminMode){
    addPlainMessage('admin', '🔒 ' + lockMessage, true);
    return;
  }

  addPlainMessage(adminMode ? 'admin' : 'user', text, false, pendingAttachment);
  if(adminMode && text) showAnnouncement(text);

  const contentBlocks = [];
  if(pendingAttachment){
    contentBlocks.push({ type: pendingAttachment.kind, source:{ type:'base64', media_type: pendingAttachment.mediaType, data: pendingAttachment.base64 } });
  }
  const defaultPrompts = {
    image: 'What do you see in this image?',
    video: 'What is happening in this video?',
    audio: 'What do you hear in this audio?',
    file: 'Please review this file.'
  };
  const outgoingText = text || (pendingAttachment ? defaultPrompts[pendingAttachment.kind] : '');
  contentBlocks.push({ type:'text', text: adminMode ? ('[ADMIN ANNOUNCEMENT] ' + outgoingText) : outgoingText });
  history.push({ role:'user', content: contentBlocks });

  textInput.value = ''; textInput.style.height = 'auto';
  pendingAttachment = null; imgPreviewWrap.style.display = 'none'; fileInput.value = '';
  hideStarterChips();

  await requestAssistantReply();
}

let activeAbortController = null;

function stopGeneration(){
  if(activeSkipTyping){ activeSkipTyping(); return; }
  if(activeAbortController){ activeAbortController.abort(); }
}

function regenerateLast(){
  if(busy) return;
  if(history.length && history[history.length-1].role === 'assistant') history.pop();
  const aiRows = messagesEl.querySelectorAll('.msg-row.ai');
  if(aiRows.length) aiRows[aiRows.length-1].remove();
  requestAssistantReply();
}

// Every request resends the full conversation history. Without this, an
// attached image/file/video from turn 1 gets re-uploaded as base64 on every
// subsequent turn, quickly ballooning past Vercel's 4.5MB request cap even
// with small attachments. Only the most recent turn needs to keep its
// attachment; earlier ones are replaced with a lightweight text placeholder.
function stripOldAttachments(){
  for(let i = 0; i < history.length - 1; i++){
    const turn = history[i];
    if(Array.isArray(turn.content)){
      turn.content = turn.content.map(block=>
        block.source ? { type:'text', text:'[attachment omitted from history to save space]' } : block
      );
    }
  }
}

async function requestAssistantReply(){
  stripOldAttachments();
  setBusy(true);
  const thinkingRow = addPlainMessage('ai thinking', '');
  const thinkingMsgEl = thinkingRow.querySelector('.msg');
  thinkingMsgEl.classList.add('thinking-box');
  thinkingMsgEl.innerHTML = '<span class="thinking-icon">✨</span><span class="thinking-text"></span>';
  let stopThinkingCycle = startThinkingCycle(thinkingMsgEl.querySelector('.thinking-text'));

  activeAbortController = new AbortController();

  async function callGeminiWithRetry(maxRetries){
    let attempt = 0;
    while(true){
      const response = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        signal: activeAbortController.signal,
        body: JSON.stringify({
          contents: toGeminiContents(history),
          systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
        })
      });
      const raw = await response.text();
      let data, parseError = false;
      try{ data = JSON.parse(raw); }catch(e){ parseError = true; }

      if(response.status === 429 && attempt < maxRetries){
        stopThinkingCycle();
        const rawMsg = (!parseError && data && data.error && data.error.message) ? data.error.message : '';
        const match = rawMsg.match(/retry in ([\d.]+)s/i);
        const waitSec = match ? Math.ceil(parseFloat(match[1])) + 1 : 15;
        for(let s = waitSec; s > 0; s--){
          thinkingMsgEl.innerHTML = `<span class="thinking-icon">⏳</span><span class="thinking-text">Google's Gemini quota is briefly maxed out — retrying in ${s}s…</span>`;
          await new Promise(r => setTimeout(r, 1000));
        }
        thinkingMsgEl.innerHTML = '<span class="thinking-icon">✨</span><span class="thinking-text"></span>';
        stopThinkingCycle = startThinkingCycle(thinkingMsgEl.querySelector('.thinking-text'));
        attempt++;
        continue;
      }
      return { response, raw, data, parseError };
    }
  }

  try{
    const { response, raw, data, parseError } = await callGeminiWithRetry(2);

    if(parseError){
      stopThinkingCycle();
      thinkingRow.remove();
      const looksLikeHtml = raw.trim().startsWith('<');
      const hint = looksLikeHtml
        ? `the server returned a web page instead of JSON (status ${response.status}). The /api/chat endpoint likely isn't set up or deployed on this host.`
        : `the server response wasn't valid JSON (status ${response.status}).`;
      addPlainMessage('ai', 'Could not reach the API: ' + hint, true);
      history.pop();
      activeAbortController = null;
      setBusy(false);
      textInput.focus();
      return;
    }
    stopThinkingCycle();
    thinkingRow.remove();

    if(!response.ok){
      if(response.status === 429){
        addPlainMessage('ai', "Google's free-tier Gemini quota is maxed out right now — this is a limit on their end, not a bug in the app. It resets on its own after a short wait. If this keeps happening, the fix is enabling billing on the Google AI Studio project behind this API key for higher limits: https://ai.google.dev/gemini-api/docs/rate-limits", true);
        if(!chatLocked) lockChat(RATE_LIMIT_LOCK_MESSAGE);
      } else {
        const msg = (data && data.error && data.error.message) ? data.error.message : ('Request failed with status ' + response.status);
        addPlainMessage('ai', 'Error: ' + msg, true);
      }
      history.pop();
    } else if(data.candidates && data.candidates.length){
      const parts = data.candidates[0].content.parts || [];
      const replyText = parts.map(p => p.text || '').join('\n').trim();
      await renderAssistantMessage(replyText || '(no text response)', true);
      history.push({ role:'assistant', content: replyText });
    } else {
      addPlainMessage('ai', 'Unexpected response: ' + JSON.stringify(data), true);
      history.pop();
    }
  }catch(err){
    stopThinkingCycle();
    thinkingRow.remove();
    if(err.name === 'AbortError'){
      addPlainMessage('ai', '⏹ Stopped.');
      history.pop();
    } else {
      addPlainMessage('ai', 'Could not reach the API: ' + err.message, true);
      history.pop();
    }
  }
  activeAbortController = null;
  setBusy(false);
  textInput.focus();
  scheduleSave();
}

addPlainMessage('ai', "Hey — I'm live. Type something, attach a photo, video, audio clip, or document, or ask me to build you something and I'll hand back real files you can preview or download.");

// ---- scroll-to-bottom floating button ----
const scrollBottomBtn = document.getElementById('scrollBottomBtn');
messagesEl.addEventListener('scroll', ()=>{
  const distanceFromBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight;
  scrollBottomBtn.classList.toggle('show', distanceFromBottom > 200);
});
scrollBottomBtn.onclick = ()=>{ messagesEl.scrollTop = messagesEl.scrollHeight; };

// ---- starter prompt chips (shown once, before the first message) ----
const STARTER_PROMPTS = [
  '✨ What can you help me with?',
  '📄 Summarize a document I attach',
  '🖼️ Describe a photo I attach',
  '🛠️ Build me a simple webpage'
];
let starterChipsEl = null;
function showStarterChips(){
  if(starterChipsEl || history.length > 0) return;
  starterChipsEl = document.createElement('div');
  starterChipsEl.className = 'starter-chips';
  STARTER_PROMPTS.forEach(p=>{
    const chip = document.createElement('button');
    chip.className = 'starter-chip';
    chip.textContent = p;
    chip.onclick = ()=>{
      textInput.value = p.replace(/^\S+\s/, '');
      textInput.focus();
      textInput.dispatchEvent(new Event('input'));
    };
    starterChipsEl.appendChild(chip);
  });
  messagesEl.appendChild(starterChipsEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideStarterChips(){
  if(starterChipsEl){ starterChipsEl.remove(); starterChipsEl = null; }
}
showStarterChips();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* offline shell is a nice-to-have, ignore failures */ });
  });
}
